<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Registration form</title>
</head>
<body>
    <h1>BBD University  registration form</h1>
  
      <form action="#" method="post">

        <!-- First Name -->
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname" required>
        <br><br>

        <!-- Last Name -->
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" required>
        <br><br>

        <!-- Roll Number -->
        <label for="rollno">Roll Number:</label>
        <input type="text" id="rollno" name="rollno" required>
        <br><br>

        <!-- Age -->
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1" required>
        <br><br>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>
        <br><br>

        <!-- Phone Number -->
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>
        <br><br>

        <!-- Address -->
        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="2" cols="20" required></textarea>
        <br><br>

        <!-- Password -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <!-- Hobbies -->
        <label>Hobbies:</label><br>
        <input type="checkbox" id="reading" name="hobbies" value="Reading">
        <label for="reading">Reading</label>

        <input type="checkbox" id="sports" name="hobbies" value="Sports">
        <label for="sports">Sports</label>

        <input type="checkbox" id="music" name="hobbies" value="Music">
        <label for="music">Music</label>

        <input type="checkbox" id="traveling" name="hobbies" value="Traveling">
        <label for="traveling">Traveling</label>

        <input type="checkbox" id="" name="hobbies" value="Cooks">
        <label for="Cooks">Cooks</label>
        <br><br>

        <!-- Buttons -->
        <input type="submit" value="Submit"> 
        <input type="reset" value="Reset">

    </form>
</body>
</html>
